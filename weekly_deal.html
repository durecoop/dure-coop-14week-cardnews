<!DOCTYPE html>

<style>
  :root {
    --green:#1a7f37; --green-l:#e6f4ea;
    --red:#e53935; --red-bg:#fff5f5;
    --orange:#f57c00; --bg:#f5f5f5; --card:#fff; --text:#111;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Malgun Gothic','맑은 고딕',sans-serif;
    height:100%;overflow:hidden;background:#000;
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;
    -webkit-font-smoothing:antialiased;
    -webkit-text-size-adjust:100%;
  }

  /* ===== SWIPER ===== */
  .swiper{width:100%;height:100%;position:relative;overflow:hidden;max-width:480px;margin:0 auto;}
  .swiper-track{
    display:flex;flex-direction:column;
    width:100%;
    transition:transform 0.4s cubic-bezier(0.22,0.68,0,1);
    will-change:transform;
  }
  .slide{
    width:100%;max-width:480px;height:100vh;height:100dvh;
    overflow:hidden;
    position:relative;
    flex-shrink:0;
    -webkit-user-select:none;user-select:none;
  }

  /* ===== PAGE INDICATOR ===== */
  .page-ind{
    position:fixed;top:max(10px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    z-index:100;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);
    color:#fff;font-size:12px;font-weight:600;
    padding:5px 14px;border-radius:12px;
    pointer-events:none;max-width:480px;
  }

  /* ===== COVER SLIDE ===== */
  .cover{
    background:linear-gradient(160deg,#145a24 0%,#2d8c3c 45%,#4caf50 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:#fff;padding:0 28px;min-height:100%;
  }
  .cover .week-badge{
    background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.4);
    font-size:14px;font-weight:700;padding:8px 22px;border-radius:24px;margin-bottom:12px;
  }
  .cover h1{
    font-size:clamp(30px,8.5vw,42px);font-weight:900;line-height:1.25;
    letter-spacing:-1.5px;margin-bottom:14px;
    text-shadow:0 3px 16px rgba(0,0,0,0.15);
  }
  .cover .sub{font-size:16px;opacity:0.85;line-height:1.6;margin-bottom:28px;word-break:keep-all;}
  .cover .stat-row{display:flex;gap:28px;margin-bottom:32px;}
  .cover .stat-num{font-size:26px;font-weight:900;}
  .cover .stat-label{font-size:11px;opacity:0.6;margin-top:2px;}
  .cover .trust-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:36px;}
  .cover .trust-pill{
    background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.3);
    padding:6px 14px;border-radius:16px;font-size:12px;font-weight:600;
  }
  .cover .swipe-hint{
    position:absolute;bottom:max(28px,env(safe-area-inset-bottom));
    font-size:13px;opacity:0.5;display:flex;align-items:center;gap:6px;
  }

  /* ===== GUIDE OVERLAY ===== */
  .guide-overlay{
    position:fixed;inset:0;z-index:500;
    background:rgba(0,0,0,0.7);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#fff;text-align:center;
    opacity:1;transition:opacity 0.6s;
    pointer-events:auto;
    max-width:480px;margin:0 auto;
  }
  .guide-overlay.hide{opacity:0;pointer-events:none;}
  .guide-hand{font-size:64px;animation:guideSwipe 1.8s ease-in-out infinite;}
  .guide-text{font-size:clamp(22px,6vw,28px);font-weight:900;margin-top:16px;letter-spacing:-1px;line-height:1.4;}
  .guide-sub{font-size:14px;opacity:0.6;margin-top:10px;}
  @keyframes guideSwipe{
    0%{transform:translateY(40px);opacity:0.4;}
    40%{transform:translateY(-40px);opacity:1;}
    70%{transform:translateY(-40px);opacity:1;}
    100%{transform:translateY(40px);opacity:0.4;}
  }

  /* ===== PRODUCT SLIDE ===== */
  .prod-slide{background:var(--card);min-height:100%;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .prod-slide .img-area{
    position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;background:#f5f5f5;flex-shrink:0;
  }
  .prod-slide .img-area img{width:100%;height:100%;object-fit:cover;}
  .prod-slide .dc-badge{
    position:absolute;top:max(14px,env(safe-area-inset-top));left:14px;
    background:var(--red);color:#fff;
    font-size:clamp(22px,6vw,28px);font-weight:900;
    padding:8px 16px;border-radius:12px;line-height:1;
    box-shadow:0 4px 14px rgba(229,57,53,0.45);
  }
  .prod-slide .tag-area{
    position:absolute;top:max(14px,env(safe-area-inset-top));right:14px;
    display:flex;gap:5px;
  }
  .prod-slide .tag{
    background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);
    color:#fff;font-size:11px;font-weight:600;padding:5px 10px;border-radius:8px;
  }
  .prod-slide .buying{
    position:absolute;bottom:12px;left:14px;
    background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);
    color:#fff;font-size:12px;font-weight:600;
    padding:6px 12px;border-radius:18px;
    display:flex;align-items:center;gap:5px;
  }
  .dot-live{width:6px;height:6px;background:#4caf50;border-radius:50%;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .week-only-badge{
    position:absolute;bottom:12px;right:14px;
    background:rgba(255,152,0,0.9);color:#fff;
    font-size:11px;font-weight:800;padding:5px 10px;border-radius:8px;
  }

  /* info */
  .prod-slide .info{padding:18px 20px 8px;flex:1;}
  .prod-slide .feat{margin-bottom:10px;}
  .prod-slide .feat-line{
    font-size:14px;color:#555;line-height:1.55;word-break:keep-all;
    padding-left:14px;position:relative;margin-bottom:3px;
  }
  .prod-slide .feat-line::before{
    content:'';position:absolute;left:0;top:8px;
    width:6px;height:6px;border-radius:50%;background:var(--green);
  }
  .prod-slide .pname{
    font-size:clamp(22px,6vw,28px);font-weight:900;letter-spacing:-0.8px;
    margin-bottom:10px;line-height:1.2;
  }
  .prod-slide .price-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
  .prod-slide .p-old{font-size:15px;color:#ccc;text-decoration:line-through;}
  .prod-slide .p-now{font-size:clamp(28px,8vw,36px);font-weight:900;color:var(--red);letter-spacing:-1px;}
  .prod-slide .p-won{font-size:17px;font-weight:700;color:var(--red);}
  .prod-slide .p-save{
    display:inline-block;background:var(--red-bg);color:var(--red);
    font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px;
  }
  .prod-slide .p-detail{font-size:12px;color:#aaa;margin-top:4px;}

  /* review */
  .rv-box{
    margin:12px 20px 0;padding:14px 16px;
    background:#f9faf9;border-radius:14px;border-left:3px solid var(--green);
  }
  .rv-box .rv-q{font-size:14px;color:#333;line-height:1.55;word-break:keep-all;}
  .rv-box .rv-meta{
    margin-top:8px;font-size:11px;color:#bbb;
    display:flex;justify-content:space-between;align-items:center;
  }
  .rv-stars{color:#ff9800;letter-spacing:1px;}
  .rv-more{
    display:flex;align-items:center;justify-content:center;gap:4px;
    margin:8px 20px 0;padding:10px;
    background:#f0f7f1;border-radius:10px;
    font-size:13px;font-weight:700;color:var(--green);
    cursor:pointer;border:none;width:calc(100% - 40px);
  }
  .rv-more:active{background:#d8eeda;}

  /* cta */
  .prod-slide .cta-bottom{
    display:flex;align-items:center;justify-content:center;gap:6px;
    padding:16px 20px;padding-bottom:max(16px,env(safe-area-inset-bottom));
    background:#fff;font-size:16px;font-weight:800;color:var(--green);
    text-decoration:none;flex-shrink:0;border-top:1px solid #eee;margin-top:auto;
  }

  /* ===== BOTTOM SHEET ===== */
  .sheet-overlay{
    position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.45);
    opacity:0;pointer-events:none;transition:opacity 0.25s;
  }
  .sheet-overlay.open{opacity:1;pointer-events:auto;}
  .sheet{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
    width:100%;max-width:480px;z-index:310;
    background:#fff;border-radius:20px 20px 0 0;
    max-height:85vh;overflow-y:auto;
    transition:transform 0.35s cubic-bezier(0.22,0.68,0,1);
    padding-bottom:max(20px,env(safe-area-inset-bottom));
  }
  .sheet.open{transform:translateX(-50%) translateY(0);}
  .sheet-handle{display:flex;justify-content:center;padding:12px 0 6px;position:sticky;top:0;background:#fff;z-index:1;border-radius:20px 20px 0 0;}
  .sheet-handle::before{content:'';width:36px;height:4px;background:#ddd;border-radius:2px;}
  .sheet-hd{padding:8px 20px 16px;text-align:center;border-bottom:1px solid #f0f0f0;}
  .sheet-hd .sh-name{font-size:18px;font-weight:900;}
  .sheet-hd .sh-period{font-size:12px;color:#aaa;margin-top:4px;}
  .sheet-hd .sh-rating{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
  .sheet-hd .sh-score{font-size:28px;font-weight:900;color:var(--green);}
  .sheet-hd .sh-stars{font-size:20px;color:#ff9800;letter-spacing:2px;}
  .sheet-hd .sh-count{font-size:12px;color:#bbb;}
  .ai-sum{margin:16px 20px;padding:14px 16px;background:linear-gradient(135deg,#f8f9ff,#f0f4ff);border:1px solid #e3e8f8;border-radius:14px;}
  .ai-sum .ai-label{font-size:11px;font-weight:700;color:#5c6bc0;margin-bottom:6px;}
  .ai-sum .ai-text{font-size:13px;color:#444;line-height:1.6;word-break:keep-all;}
  .sheet-boxes{display:flex;gap:10px;padding:0 20px 14px;}
  .sbox{flex:1;padding:14px;border-radius:14px;text-align:center;}
  .sbox.pos{background:#f0fff4;border:1px solid #c8e6c9;}
  .sbox.neg{background:#fff8f8;border:1px solid #ffcdd2;}
  .sbox .sb-icon{font-size:22px;margin-bottom:4px;}
  .sbox .sb-label{font-size:12px;font-weight:700;}
  .sbox.pos .sb-label{color:var(--green);} .sbox.neg .sb-label{color:var(--red);}
  .sbox .sb-count{font-size:11px;color:#aaa;}
  .sheet-kw{padding:0 20px 14px;}
  .sheet-kw .sk-title{font-size:13px;font-weight:700;margin-bottom:8px;color:#555;}
  .sk-pills{display:flex;flex-wrap:wrap;gap:6px;}
  .sk-pill{padding:6px 12px;border-radius:16px;font-size:12px;font-weight:600;}
  .sk-pill.pos{background:#e8f5e9;color:#2e7d32;} .sk-pill.neg{background:#ffebee;color:#c62828;}
  .sk-pill .sk-n{font-weight:800;margin-left:3px;}
  .sheet-rvs{padding:0 20px 16px;}
  .sr-sec{margin-bottom:14px;}
  .sr-sec .sr-t{font-size:14px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .sr-sec .sr-t.pt{color:var(--green);} .sr-sec .sr-t.nt{color:var(--red);}
  .sr-i{padding:12px 14px;border-radius:12px;margin-bottom:8px;font-size:13px;line-height:1.55;word-break:keep-all;}
  .sr-i.pi{background:#f6faf6;border-left:3px solid #4caf50;color:#333;}
  .sr-i.ni{background:#fef6f6;border-left:3px solid #ef5350;color:#333;}
  .sr-i .sr-m{margin-top:6px;font-size:11px;color:#bbb;display:flex;justify-content:space-between;}

  /* ===== RANKING BADGE ===== */
  .rank-badge{
    position:absolute;top:max(14px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    z-index:5;display:flex;align-items:center;gap:6px;
    background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);
    color:#fff;padding:6px 16px;border-radius:20px;
    font-size:13px;font-weight:800;letter-spacing:-0.3px;
  }
  .rank-num{
    display:inline-flex;align-items:center;justify-content:center;
    width:26px;height:26px;border-radius:50%;
    font-size:14px;font-weight:900;
  }
  .rank-1 .rank-num{background:#FFD700;color:#5a4000;}
  .rank-2 .rank-num{background:#C0C0C0;color:#444;}
  .rank-3 .rank-num{background:#CD7F32;color:#fff;}
  .rank-label{font-size:11px;opacity:0.7;font-weight:500;}

  /* ===== PROGRESS BAR ===== */
  .progress-wrap{
    position:fixed;bottom:max(52px,calc(env(safe-area-inset-bottom) + 52px));left:50%;transform:translateX(-50%);
    width:calc(100% - 80px);max-width:360px;z-index:150;
    pointer-events:none;
  }
  .progress-bar{
    height:3px;background:rgba(255,255,255,0.15);border-radius:2px;overflow:hidden;
  }
  .progress-fill{
    height:100%;background:var(--green);border-radius:2px;
    transition:width 0.4s cubic-bezier(0.22,0.68,0,1);width:0%;
  }

  /* ===== BUYING COUNT ENHANCED ===== */
  .prod-slide .buying{
    position:absolute;bottom:12px;left:14px;
    background:rgba(26,127,55,0.85);backdrop-filter:blur(6px);
    color:#fff;font-size:12px;font-weight:700;
    padding:6px 14px;border-radius:18px;
    display:flex;align-items:center;gap:5px;
    animation:buyPulse 2s ease-in-out infinite;
  }
  @keyframes buyPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

  /* ===== SAVINGS HIGHLIGHT ===== */
  .prod-slide .p-save{
    display:inline-block;background:var(--red-bg);color:var(--red);
    font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;
    animation:savePop 0.6s ease-out;
  }
  @keyframes savePop{0%{transform:scale(0.8);opacity:0}100%{transform:scale(1);opacity:1}}

  /* ===== FORMAT NAV (cross-link) ===== */
  .format-nav{
    position:fixed;bottom:max(8px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    z-index:200;display:flex;gap:4px;
    background:rgba(0,0,0,0.65);backdrop-filter:blur(10px);
    border-radius:24px;padding:4px;max-width:280px;
  }
  .fn-item{
    padding:8px 14px;border-radius:20px;font-size:12px;font-weight:700;
    text-decoration:none;color:rgba(255,255,255,0.6);
    transition:all 0.2s;white-space:nowrap;
  }
  .fn-item.active{background:var(--green);color:#fff;}
  .fn-item:not(.active):active{color:#fff;}

  /* ===== FONT SIZE TOGGLE ===== */
  .font-ctrl{
    position:fixed;top:max(10px,env(safe-area-inset-top));right:52px;z-index:200;
    display:flex;gap:2px;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);
    border-radius:10px;padding:2px;
  }
  .font-ctrl button{
    border:none;background:none;cursor:pointer;padding:6px 10px;
    border-radius:8px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.6);
    transition:all 0.2s;min-height:32px;
  }
  .font-ctrl button.on{background:var(--green);color:#fff;}
</style>
</head>

// ======== IMAGE FALLBACK ========
function imgFallback(el){
  var src = el.src;
  if(src.endsWith('.jpg')){
    el.src = src.replace(/\.jpg$/,'.png');
  } else if(src.endsWith('.png')){
    el.src = src.replace(/\.png$/,'.jpeg');
  } else {
    el.style.display='none';
  }
}

            '<div class="feat-line">'+p.f2+'</div>'+
          '</div>'+
          '<div class="pname">'+p.name+'</div>'+
          '<div class="price-row">'+
            oldHTML+
            '<span class="p-now">'+p.now+'</span><span class="p-won">원</span>'+
            saveHTML+
          '</div>'+

          buyCountHTML+
        '</div>'+
        rvBoxHTML+
        moreBtn+
        '<a class="cta-bottom" href="'+LINK+'" target="_blank">기획전에서 주문하기 &#10132;</a>'+
      '</div>';
    track.appendChild(slide);
  });

  // Update page indicator total
  document.getElementById('pageInd').textContent = '1 / ' + (products.length + 1);
})();

// ======== SWIPER ========
(function(){
  var track = document.getElementById('track');
  var ind = document.getElementById('pageInd');
  var total = products.length + 1;
  var current = 0, startY = 0, diffY = 0, dragging = false, isVertical = null;
  var animating = false;

  function goTo(i){
    if(animating) return;
    current = Math.max(0, Math.min(total-1, i));
    track.style.transition = 'transform 0.4s cubic-bezier(0.22,0.68,0,1)';
    track.style.transform = 'translateY(' + (-current * 100) + 'dvh)';
    ind.textContent = (current+1)+' / '+total;
    var pf=document.getElementById('progressFill');
    if(pf) pf.style.width = (current/(total-1)*100)+'%';
    animating = true;
    setTimeout(function(){ animating=false; },420);
  }

  track.addEventListener('touchstart',function(e){
    if(animating)return;
    startY=e.touches[0].clientY;
    diffY=0; dragging=true; isVertical=null;
    track.style.transition='none';
  },{passive:true});

  track.addEventListener('touchmove',function(e){
    if(!dragging||animating)return;
    var dy = e.touches[0].clientY - startY;
    if(isVertical===null){
      var absDy = Math.abs(dy);
      var absDx = Math.abs(e.touches[0].clientX - startY);
      if(absDy>8){ isVertical=true; }
      else if(absDx>8){ isVertical=false; return; }
      return;
    }
    if(!isVertical) return;
    e.preventDefault();
    diffY = dy;
    var offset;
    if((current===0 && diffY>0)||(current===total-1 && diffY<0)){
      offset = -current * window.innerHeight + diffY*0.3;
    } else {
      offset = -current * window.innerHeight + diffY;
    }
    track.style.transform = 'translateY('+offset+'px)';
  },{passive:false});

  track.addEventListener('touchend',function(){
    if(!dragging)return; dragging=false;
    if(isVertical && Math.abs(diffY)>50) goTo(diffY<0?current+1:current-1);
    else goTo(current);
    diffY=0;
  });

  // Mouse wheel
  var wheelTimer=null;
  document.addEventListener('wheel',function(e){
    e.preventDefault();
    if(animating)return;
    if(wheelTimer)return;
    wheelTimer=setTimeout(function(){wheelTimer=null;},500);
    if(e.deltaY>30) goTo(current+1);
    else if(e.deltaY<-30) goTo(current-1);
  },{passive:false});

  // Mouse drag
  var mouseDown=false,mStartY=0,mDiff=0;
  track.addEventListener('mousedown',function(e){
    if(animating)return; mouseDown=true; mStartY=e.clientY; mDiff=0;
    track.style.transition='none'; e.preventDefault();
  });
  document.addEventListener('mousemove',function(e){
    if(!mouseDown)return; mDiff=e.clientY-mStartY;
    track.style.transform='translateY('+(-current*window.innerHeight+mDiff)+'px)';
  });
  document.addEventListener('mouseup',function(){
    if(!mouseDown)return; mouseDown=false;
    if(Math.abs(mDiff)>60) goTo(mDiff<0?current+1:current-1);
    else goTo(current); mDiff=0;
  });

  // Keyboard
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goTo(current+1);}
    if(e.key==='ArrowUp'){e.preventDefault();goTo(current-1);}
  });

  // Prevent link click on swipe
  track.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click',function(e){
      if(Math.abs(diffY)>10||Math.abs(mDiff)>10) e.preventDefault();
    });
  });
})();

// ======== BOTTOM SHEET ========
function openSheet(idx){
  event.preventDefault();
  var d = products[idx].rvData;
  if(!d)return;
  document.getElementById('shName').textContent = products[idx].name;
  document.getElementById('shScore').textContent = d.score;
  document.getElementById('shStars').innerHTML = d.stars;
  document.getElementById('shCount').textContent = d.count;
  document.getElementById('shAI').textContent = d.ai;
  document.getElementById('shPosC').textContent = d.posC;
  document.getElementById('shNegC').textContent = d.negC;

  var kwH='';
  d.kw.forEach(function(k){kwH+='<span class="sk-pill '+(k.p?'pos':'neg')+'">'+k.t+'<span class="sk-n">'+k.n+'</span></span>';});
  document.getElementById('shKW').innerHTML=kwH;

  var rH='<div class="sr-sec"><div class="sr-t pt">&#128077; 긍정 의견</div>';
  d.pos.forEach(function(r){rH+='<div class="sr-i pi">'+r.t+'<div class="sr-m"><span>'+r.a+'</span><span>'+r.d+'</span></div></div>';});
  rH+='</div><div class="sr-sec"><div class="sr-t nt">&#128078; 아쉬운 점</div>';
  d.neg.forEach(function(r){rH+='<div class="sr-i ni">'+r.t+'<div class="sr-m"><span>'+r.a+'</span><span>'+r.d+'</span></div></div>';});
  rH+='</div>';
  document.getElementById('shRvs').innerHTML=rH;

  document.getElementById('sheetOverlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSheet(){
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('sheetOverlay').addEventListener('click',closeSheet);
(function(){
  var sh=document.getElementById('sheet'),sY=0,dy=0;
  sh.addEventListener('touchstart',function(e){if(sh.scrollTop<=0)sY=e.touches[0].clientY;},{passive:true});
  sh.addEventListener('touchmove',function(e){if(!sY)return;dy=e.touches[0].clientY-sY;if(dy>0)sh.style.transform='translateX(-50%) translateY('+dy+'px)';},{passive:true});
  sh.addEventListener('touchend',function(){if(dy>100)closeSheet();sh.style.transform='';sY=0;dy=0;});
})();

// ======== FONT SIZE ========
function cSz(s){
  document.documentElement.style.fontSize=(16*s)+'px';
  document.querySelectorAll('.font-ctrl button').forEach(function(b){b.classList.remove('on');});
  if(s<1) document.getElementById('cf1').classList.add('on');
  else if(s>1) document.getElementById('cf3').classList.add('on');
  else document.getElementById('cf2').classList.add('on');
}
</script>
